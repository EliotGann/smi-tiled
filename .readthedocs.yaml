# Read the Docs build configuration.
#
# Hosting setup:
#   1. Sign in to https://readthedocs.org/ with your GitHub account.
#   2. Click "Import a Project" and select the smi-tiled GitHub repo.
#   3. Read the Docs auto-detects this file and builds the docs.
#   4. Docs go live at https://smi-tiled.readthedocs.io/.
#
# After import, every push to `main` (and every tag) triggers a build.
# Pull requests get a preview build linked from a status check.
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  jobs:
    pre_install:
      - python -m pip install --upgrade pip
    post_checkout:
      # Fetch the full history so setuptools-scm can compute the version.
      - git fetch --unshallow || true

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - tiled
        - upload
        - docs

sphinx:
  configuration: docs/source/conf.py
  fail_on_warning: false

formats:
  - htmlzip
  - pdf
