name: Docs

# Builds the Sphinx documentation and (on pushes to main) deploys it
# to GitHub Pages.  This is an *alternative* to ReadTheDocs — both can
# coexist.  After the first successful run:
#
#   1. Go to repo Settings → Pages.
#   2. Set Source = "Deploy from a branch", branch = `gh-pages`, dir = `/`.
#   3. Docs go live at https://EliotGann.github.io/smi-tiled/.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs when a new commit lands.
concurrency:
  group: "docs-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # setuptools-scm needs tags

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.56.0
          cache: true

      - name: Install docs environment
        run: pixi install -e docs

      - name: Build docs
        run: pixi run -e docs docs-build

      - name: Link check (non-fatal)
        run: pixi run -e docs docs-linkcheck || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: html-docs
          path: docs/build/html

      - name: Upload to Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
